<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="robots" content="index, follow">

    <meta property="og:title" content="KGN Onion Birista - Premium Crispy Fried Onions">
    <meta property="og:description" content="Get restaurant-style crunch instantly. Premium packs available in 250g, 500g, and 1kg. Secure payments & live tracking.">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    
    <style>
        :root {
            --primary: #6E360F;
            --primary-light: #CD853F;
            --accent: #FF8C00;
            --accent-gold: #D4AF37;
            --bg-light: #FCF9F5;
            --bg-card: #ffffff;
            --text-dark: #2C2520;
            --text-muted: #6E5A4E;
            --border-color: #EFEAE4;
            --card-shadow: 0 10px 30px rgba(110, 54, 15, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        .dark-mode {
            --primary: #F0E6DF;
            --primary-light: #CD853F;
            --accent: #FF9F43;
            --bg-light: #1A1512;
            --bg-card: #251E1A;
            --text-dark: #F5EFEB;
            --text-muted: #C5B3A6;
            --border-color: #3A3029;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.5);
            --nav-bg: rgba(37, 30, 26, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-light); color: var(--text-dark); transition: background 0.3s, color 0.3s; overflow-x: hidden; padding-bottom: 60px; }

        #scrollProgress { position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(to right, var(--accent), var(--accent-gold)); width: 0%; z-index: 9999; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-onion { font-size: 60px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }

        .section-padding { padding: 60px 5% 30px 5%; }
        .container { max-width: 1200px; margin: 0 auto; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .title-main { text-align: center; font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 15px; position: relative; }
        .title-main::after { content: ''; display: block; width: 60px; height: 3px; background: var(--accent); margin: 10px auto 0; border-radius: 2px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 15px; margin-bottom: 40px; }

        .top-badges-ticker { background: linear-gradient(45deg, var(--primary), #4A2206); color: #fff; font-size: 13px; font-weight: 600; padding: 10px 0; overflow: hidden; display: flex; width: 100%; }
        .ticker-badges-wrap { display: flex; width: 200%; animation: scrollBadges 15s linear infinite; gap: 60px; justify-content: space-around; align-items: center; white-space: nowrap; }
        @keyframes scrollBadges { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-badge-item { display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        .ticker-badge-item i { color: var(--accent-gold); }

        header { background: var(--nav-bg); backdrop-filter: blur(10px); box-shadow: 0 2px 20px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 900; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; transition: background 0.3s; }
        .brand-link { text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .brand-text h1 { color: var(--primary); font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .brand-text p { font-size: 10px; color: var(--primary-light); font-weight: 700; text-transform: uppercase; }
        .logo-container img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--accent-gold); object-fit: cover; }
        .nav-actions { display: flex; align-items: center; gap: 15px; }

        .btn-icon-nav { background: var(--bg-light); border: 1px solid var(--border-color); color: var(--text-dark); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; position: relative; font-size: 16px; transition: all 0.3s; }
        .btn-icon-nav:hover { background: var(--primary); color: #fff; }
        .badge-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .presentation-slider { margin-bottom: 40px; border-radius: 24px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid var(--border-color); }

        /* Naya Tracking Section Styling */
        .tracking-box { background: var(--bg-card); border: 2px dashed var(--primary-light); border-radius: 16px; padding: 25px; margin: 30px auto; max-width: 500px; text-align: center; box-shadow: var(--card-shadow); }
        .tracking-box input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; text-align: center; }
        .tracking-box button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .tracking-box button:hover { background: var(--accent); }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-top: 15px; font-size: 18px; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-approved { background: #D4EDDA; color: #155724; }
        .status-dispatched { background: #CCE5FF; color: #004085; }
    </style>
</head>
<body>

    <div id="scrollProgress"></div>

    <!-- Ticker Top -->
    <div class="top-badges-ticker">
        <div class="ticker-badges-wrap">
            <div class="ticker-badge-item"><i class="fa-solid fa-fire"></i> 100% Fresh Onion Fried</div>
            <div class="ticker-badge-item"><i class="fa-solid fa-truck"></i> Fast Delivery in Surat</div>
            <div class="ticker-badge-item"><i class="fa-solid fa-award"></i> Premium Quality Birista</div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <a href="#" class="brand-link">
            <div class="logo-container">
                <div class="loader-onion">🧅</div>
            </div>
            <div class="brand-text">
                <h1>KGN Birista</h1>
                <p>Premium Quality</p>
            </div>
        </a>
    </header>

    <!-- MAIN BODY CONTENT -->
    <main class="container section-padding">
        
        <!-- Live Order Tracking Area -->
        <div class="tracking-box" data-aos="fade-up">
            <h2>📦 Apna Order Track Karein</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Order status live dekhne ke liye apna phone number dalein:</p>
            <input type="number" id="trackPhone" placeholder="Enter Registered Phone Number">
            <br>
            <button onclick="trackCustomerOrder()">Live Status Dekhein</button>
            <div id="trackResult" style="margin-top: 15px;"></div>
        </div>

        <!-- Yahan niche aapka baaki ka products aur cart section chalega -->
        <div class="title-main">Hamare Products</div>
        <p class="subtitle">Bina kisi jhanjhat ke restaurant jaisa taste ghar par paayein</p>

    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        // Loader hatane ke liye
        window.addEventListener('load', () => {
            const scroll = document.getElementById('scrollProgress');
            window.addEventListener('scroll', () => {
                const totalScroll = document.documentElement.scrollHeight - window.innerHeight;
                if(totalScroll > 0) {
                    scroll.style.width = (window.pageYOffset / totalScroll) * 100 + '%';
                }
            });
        });

        // LIVE TRACKING FUNCTION
        async function trackCustomerOrder() {
            const phoneInput = document.getElementById('trackPhone').value.trim();
            const resultDiv = document.getElementById('trackResult');

            if (!phoneInput) {
                resultDiv.innerHTML = "<p style='color: red;'>Kripya apna phone number dalein!</p>";
                return;
            }

            resultDiv.innerHTML = "<p style='color: var(--text-muted);'>Database se check kar rahe hain... ⏳</p>";

            try {
                // Backend Database (Supabase) se live orders fetch karna
                const res = await fetch('/api/admin/orders');
                if (!res.ok) throw new Error("Data nahi mila");
                
                const orders = await res.json();
                
                // Customer ke phone number se order match karna (sabse naya order pehle)
                const customerOrder = orders.find(order => String(order.phone).trim() === phoneInput);

                if (customerOrder) {
                    let statusClass = 'status-pending';
                    let statusText = '⏳ Pending (Aapka order mil gaya hai)';

                    if (customerOrder.status === 'Approved') {
                        statusClass = 'status-approved';
                        statusText = '✅ Approved (Dukan par taiyar ho raha hai)';
                    } else if (customerOrder.status === 'Dispatched') {
                        statusClass = 'status-dispatched';
                        statusText = '🚚 Dispatched (Delivery ke liye nikal chuka hai)';
                    }

                    resultDiv.innerHTML = `
                        <div style="border-top: 1px solid var(--border-color); padding-top: 10px;">
                            <p><strong>Customer Name:</strong> ${customerOrder.customer_name}</p>
                            <p><strong>Total Amount:</strong> ₹${customerOrder.total_amount}</p>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = "<p style='color: red; font-weight: bold;'>Is number se koi order nahi mila. Kripya sahi number dalein!</p>";
                }

            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = "<p style='color: red;'>Server connect karne mein dikkat aayi. Kripya thodi der baad try karein!</p>";
            }
        }
    </script>
</body>
</html>
